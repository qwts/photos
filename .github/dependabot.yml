version: 2
updates:
  # Grouped weekly npm updates: one PR for all devDependencies instead of a PR per package.
  # Pairs with the exact-pin policy (scripts/check-package-pins.mjs): Dependabot is the only
  # actor that bumps versions; the pins make every bump an explicit, reviewable diff.
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    groups:
      dev-deps:
        patterns:
          - '*'
    ignore:
      # The toolchain is pinned to the TS 6 line: typescript-eslint's peer range caps at
      # <6.1.0 (no stable release supports TS 7), and type-coverage is overridden to the
      # project compiler. Remove this once typescript-eslint supports TS 7 and bump
      # deliberately (see PR #21 for the original downgrade rationale).
      - dependency-name: typescript
        versions: ['>=6.1.0']

  # Keep the pinned action versions in .github/workflows current the same way.
  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - '*'
