version: 2
updates:
  # Grouped weekly npm updates. Pairs with the exact-pin policy
  # (scripts/check-package-pins.mjs): Dependabot is the only actor that bumps
  # versions; the pins make every bump an explicit, reviewable diff.
  #
  # Split by peer-coupled cluster (not one big group) so an unresolvable major
  # in one dependency graph only reddens its own PR instead of blocking every
  # other safe bump — PR #153 was one Vite 8 conflict that failed `npm ci` for
  # the whole batch and masked five unrelated updates. Dependabot assigns each
  # dependency to the FIRST group whose patterns match, so the specific clusters
  # are listed before the `dev-tooling` catch-all.
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    groups:
      # Vite + Electron + React + Storybook are one peer graph: @vitejs/plugin-react
      # bridges vite<->react and @storybook/react-vite bridges both, so they must
      # move in lockstep and a wall on any one legitimately holds the whole
      # coordinated upgrade (both current walls — Vite 8 and React 19 — live here).
      build-toolchain:
        patterns:
          - 'vite'
          - '@vitejs/*'
          - 'electron*'
          - 'react'
          - 'react-dom'
          - '@types/react'
          - '@types/react-dom'
          - 'storybook'
          - '@storybook/*'
          - 'eslint-plugin-react-hooks'
          - '@eslint-react/*'
          - 'lucide-react'
      # TypeScript + its lint/analysis tools; all gated on the TS major via
      # typescript-eslint's peer cap — the next likely wall as TS 7 lands.
      lint-and-types:
        patterns:
          - 'typescript'
          - 'typescript-eslint'
          - 'eslint'
          - '@eslint/*'
          - 'type-coverage'
          - 'madge'
          - 'knip'
      # Everything else: low peer-constraint risk, keeps flowing as one PR.
      dev-tooling:
        patterns:
          - '*'
    ignore:
      # The toolchain is pinned to the TS 6 line: typescript-eslint's peer range caps at
      # <6.1.0 (no stable release supports TS 7), and type-coverage is overridden to the
      # project compiler. Remove this once typescript-eslint supports TS 7 and bump
      # deliberately (see PR #21 for the original downgrade rationale).
      - dependency-name: typescript
        versions: ['>=6.1.0']
      # @types/node must track the runtime major pinned in .nvmrc (Node 24), not npm's
      # latest — typecheck would otherwise accept APIs the runtime doesn't have. Bump
      # together with .nvmrc when the runtime moves.
      - dependency-name: '@types/node'
        versions: ['>=25']
      # Electron is capped at the newest major with better-sqlite3-multiple-ciphers
      # Electron-ABI prebuilds (ADR-0006 prebuilt-only policy; 43 = ABI v148 has none
      # as of 2026-07-12). Remove once the fork publishes the matching ABI, and bump
      # electron + the driver together (issue #72 records the pin-down from 43.1.0).
      - dependency-name: electron
        versions: ['>=43']
      # Vite is capped at the 7 line: electron-vite@5 (stable) peers vite ^5||^6||^7,
      # with Vite 8 support only in the unreleased 6.0 betas, and @vitejs/plugin-react@6
      # peers vite ^8 (plus new babel-plugin-react-compiler peers), so both are gated on
      # the same wall. Remove both once electron-vite ships a stable Vite 8 release and
      # bump vite + @vitejs/plugin-react + electron-vite together (blocked PR #153).
      - dependency-name: vite
        versions: ['>=8']
      - dependency-name: '@vitejs/plugin-react'
        versions: ['>=6']
      # React is held on the 18 line: React 19 is a deliberate migration (new JSX
      # transform, ref-as-prop, removed legacy APIs), not a nod-through bump. Remove
      # these four together when React 19 is taken on as its own reviewed PR.
      - dependency-name: react
        versions: ['>=19']
      - dependency-name: react-dom
        versions: ['>=19']
      - dependency-name: '@types/react'
        versions: ['>=19']
      - dependency-name: '@types/react-dom'
        versions: ['>=19']

  # Keep the pinned action versions in .github/workflows current the same way.
  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - '*'
