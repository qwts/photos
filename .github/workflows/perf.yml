name: Perf harness

# The M11 perf lane (#123): manual only — the 200K harness takes minutes
# and measures timings, so it never gates PRs. Budgets are ratchets
# (tests/perf/budgets.ts; wiki Testing-Strategy §Perf budgets). CI numbers
# are indicative — the recorded baselines come from the dev machine.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  perf:
    name: 200K perf harness
    runs-on: ubuntu-latest
    # Outer backstop only — the harness itself runs under scripts/run-guarded.mjs
    # (aggregate-RSS ceiling + a 2700s/45min wall-clock timeout, generous pending a
    # real measured peak — see docs/agent-process-guard.md). Raised from the prior
    # 30 to leave headroom around that guard timeout for setup/Electron-install/upload.
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Electron system dependencies
        run: |
          npx playwright install-deps chromium
          sudo apt-get install --yes xvfb

      - name: Ensure Electron binary
        run: node node_modules/electron/install.js

      - name: Run the perf harness (Electron under Xvfb)
        run: xvfb-run --auto-servernum -- npm run test:perf

      # Peak-RSS/duration record from the process-tree guard (scripts/run-guarded.mjs).
      # The perf lane's ceilings are provisional (docs/agent-process-guard.md) — this
      # is the data source for ratcheting them from a measured peak. Runs even on
      # failure: an rss-limit/timeout kill is exactly when the record matters.
      - name: Guard diagnostics
        if: ${{ !cancelled() }}
        run: cat .guard/last-run.json || true

      - name: Upload perf report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: perf-report
          path: test-results/perf-report.json
          retention-days: 90
