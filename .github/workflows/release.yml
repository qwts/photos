# Dev releases (#172): v* tag → unsigned builds → GitHub pre-release.
#
# Normally dispatched by version-cut.yml from main with the tag as an input —
# GITHUB_TOKEN tag pushes fire no workflows, and dispatching by tag ref only
# works when the tag already contains this file (PR #181 review), which a
# stranded tag by definition does not. The on:push:tags trigger still covers
# tags pushed by humans. Builds check out the TAG's tree regardless of the
# dispatching ref, and reuse the Package matrix via workflow_call. Pre-release
# (not release) while builds are unsigned; once the signing secrets exist
# (#128) the mac build is signed + notarized and the tag publishes as a full
# release instead.
name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing v* tag to build and release'
        type: string
        required: true

permissions:
  contents: read

concurrency:
  group: release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build packages
    uses: ./.github/workflows/package.yml
    with:
      ref: ${{ inputs.tag || github.ref_name }}
    # Signing/notarization secrets (#128); absent secrets = unsigned build.
    secrets: inherit

  publish:
    name: Publish pre-release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TAG: ${{ inputs.tag || github.ref_name }}
    steps:
      - name: Guard tag shape
        run: |
          case "$TAG" in
            v[0-9]*) ;;
            *) echo "::error::Release runs only on v* tags (got $TAG)."; exit 1;;
          esac

      - name: Checkout the tag
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: overlook-*
          path: dist
          merge-multiple: true

      - name: Zip the design package
        run: (cd design && zip -qr ../dist/overlook-design-package.zip handoff)

      - name: Extract release notes from CHANGELOG
        run: |
          version="${TAG#v}"
          awk -v ver="$version" '
            $0 ~ "^## " ver "$" { grab = 1; next }
            grab && /^## / { exit }
            grab { print }
          ' CHANGELOG.md > notes.md
          if [ ! -s notes.md ]; then
            echo "_No CHANGELOG section found for $version._" > notes.md
          fi

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          # Mirrors the gate in package.yml: full release only when the mac
          # build could sign AND notarize (cert-only would leave Gatekeeper
          # rejecting the app — package.yml's spctl gate fails that build
          # anyway); otherwise the historical unsigned pre-release (#128).
          SIGNED: ${{ secrets.CSC_LINK != '' && secrets.APPLE_API_KEY != '' }}
        run: |
          if [ "$SIGNED" = "true" ]; then
            prerelease=false
            title="Overlook $TAG"
          else
            prerelease=true
            title="Overlook $TAG (unsigned dev build)"
          fi
          mapfile -d '' -t assets < <(find dist -type f -print0 | sort -z)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "::error::No release assets were downloaded."
            exit 1
          fi
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            # Re-runs must also promote/demote, not just swap assets — e.g. a
            # tag first published unsigned and rebuilt after secrets landed.
            echo "Release $TAG exists — updating flags and replacing assets."
            gh release edit "$TAG" --prerelease="$prerelease" --title "$title" \
              --repo "$GITHUB_REPOSITORY"
            gh release upload "$TAG" "${assets[@]}" --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$TAG" "${assets[@]}" \
              --prerelease="$prerelease" \
              --title "$title" \
              --notes-file notes.md \
              --repo "$GITHUB_REPOSITORY"
          fi
