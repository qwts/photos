# Dev releases (#172): v* tag → packaged builds → GitHub prerelease.
#
# Normally dispatched by version-cut.yml from main with the tag as an input —
# GITHUB_TOKEN tag pushes fire no workflows, and dispatching by tag ref only
# works when the tag already contains this file (PR #181 review), which a
# stranded tag by definition does not. The on:push:tags trigger still covers
# tags pushed by humans. Builds check out the TAG's tree regardless of the
# dispatching ref, and reuse the Package matrix via workflow_call. Signing is
# reported on each downloadable installer; it never pollutes the release/tag
# title. Every build remains explicitly prerelease software (#735).
name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing v* tag to build and release'
        type: string
        required: true

permissions:
  contents: read

concurrency:
  group: release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build packages
    uses: ./.github/workflows/package.yml
    with:
      ref: ${{ inputs.tag || github.ref_name }}
    # Signing/notarization secrets (#128); absent secrets = unsigned build.
    secrets: inherit

  publish:
    name: Publish prerelease
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TAG: ${{ inputs.tag || github.ref_name }}
    steps:
      - name: Guard tag shape
        run: |
          case "$TAG" in
            v[0-9]*) ;;
            *) echo "::error::Release runs only on v* tags (got $TAG)."; exit 1;;
          esac

      - name: Checkout the tag
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: overlook-*
          path: dist
          merge-multiple: true

      - name: Zip the design package
        run: (cd design && zip -qr ../dist/overlook-design-package.zip handoff)

      - name: Extract release notes from CHANGELOG
        run: |
          version="${TAG#v}"
          awk -v ver="$version" '
            $0 ~ "^## " ver "$" { grab = 1; next }
            grab && /^## / { exit }
            grab { print }
          ' CHANGELOG.md > notes.md
          if [ ! -s notes.md ]; then
            echo "_No CHANGELOG section found for $version._" > notes.md
          fi

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          # Mirror package.yml's platform gates so each clickable installer
          # states its own signing status. A mac cert without notarization
          # credentials cannot produce a signed release artifact; Windows uses
          # its separate Authenticode secret (#128, #683, #735).
          MAC_SIGNED: ${{ secrets.CSC_LINK != '' && secrets.APPLE_API_KEY != '' }}
          WINDOWS_SIGNED: ${{ secrets.WIN_CSC_LINK != '' }}
        run: |
          title="Overlook $TAG"
          asset_specs=()
          while IFS= read -r -d '' asset; do
            name="${asset##*/}"
            case "$name" in
              *.dmg|*-mac.zip)
                if [ "$MAC_SIGNED" = "true" ]; then status=signed; else status=unsigned; fi
                asset_specs+=("$asset#$name ($status)")
                ;;
              *.exe)
                if [ "$WINDOWS_SIGNED" = "true" ]; then status=signed; else status=unsigned; fi
                asset_specs+=("$asset#$name ($status)")
                ;;
              *) asset_specs+=("$asset") ;;
            esac
          done < <(find dist -type f -print0 | sort -z)
          if [ "${#asset_specs[@]}" -eq 0 ]; then
            echo "::error::No release assets were downloaded."
            exit 1
          fi
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            # Re-runs correct historical prerelease/title metadata and replace
            # installer labels if signing availability changed.
            echo "Release $TAG exists — updating metadata and replacing assets."
            gh release edit "$TAG" --prerelease --title "$title" \
              --repo "$GITHUB_REPOSITORY"
            gh release upload "$TAG" "${asset_specs[@]}" --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$TAG" "${asset_specs[@]}" \
              --prerelease \
              --title "$title" \
              --notes-file notes.md \
              --repo "$GITHUB_REPOSITORY"
          fi
