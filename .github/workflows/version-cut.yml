# Version-cut automation (#171): consumes accumulated changesets into releases.
#
# Two halves, both driven by pushes to main:
#  1. version-pr — while changesets are pending, keep a "Version packages" PR
#     open and current (changesets/action force-refreshes changeset-release/main
#     on every main push). Merging that PR is the human "cut a release" act.
#  2. tag — after the version PR merges (no changesets pending, version in
#     package.json untagged), tag v<version> and hand off to the release
#     workflow.
#
# GITHUB_TOKEN events cannot trigger other workflows, which bites twice here:
#  - the bot-refreshed version PR gets no pull_request CI runs, yet main
#    requires the "CI" and "E2E gate" checks — so we explicitly dispatch ci.yml
#    onto the version branch after each refresh;
#  - the tag push triggers no on:push:tags run — so we explicitly dispatch the
#    release workflow instead of relying on the tag event.
name: Version cut

on:
  push:
    branches:
      - main
  # Manual refresh / recovery (e.g. re-tag after a partial failure).
  workflow_dispatch:

# Serialize whole-workflow runs: back-to-back merges otherwise race the
# version-branch force-push and the tag/rev-parse check.
concurrency:
  group: version-cut
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  version-pr:
    name: Version packages PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      # Dispatching ci.yml onto the version branch.
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      # The changeset CLI is plain JS — skip postinstall (Electron binary
      # download + native rebuild) that versioning never needs.
      - name: Install dependencies (scripts skipped)
        run: npm ci --ignore-scripts

      - name: Create or refresh the Version packages PR
        id: changesets
        uses: changesets/action@v1
        with:
          version: npx changeset version
          commit: 'Version packages'
          title: 'Version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run required checks on the version branch
        # Empty changesets make hasChangesets true, but the action creates no
        # branch or PR for them. The PR number is only set after that ref exists.
        if: steps.changesets.outputs.pullRequestNumber != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run ci.yml --ref changeset-release/main

  tag:
    name: Tag version merges
    runs-on: ubuntu-latest
    permissions:
      contents: write
      # Dispatching the release workflow for the new tag.
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Tags + history for the already-tagged check.
          fetch-depth: 0

      - name: Tag when the current version is a fresh cut
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          # Push events only tag when this push actually changed the version —
          # otherwise the first changeset-free push after this workflow lands
          # would tag the never-cut 0.1.0 at an arbitrary commit. Manual
          # dispatch skips the comparison (recovery for a cut whose tagging
          # failed) but still requires no-pending-changesets + untagged below.
          if [ "$EVENT_NAME" = "push" ]; then
            prev=$(git show 'HEAD~1:package.json' 2>/dev/null | node -p 'JSON.parse(require("fs").readFileSync(0,"utf8")).version' 2>/dev/null || echo '')
            cur=$(node -p 'require("./package.json").version')
            if [ "$prev" = "$cur" ]; then
              echo "Version unchanged ($cur) — not a version-cut merge."
              exit 0
            fi
          fi
          pending=$(find .changeset -name '*.md' ! -name 'README.md' | head -1)
          if [ -n "$pending" ]; then
            echo "Changesets pending — nothing to tag."
            exit 0
          fi
          version="v$(node -p "require('./package.json').version")"
          if git rev-parse -q --verify "refs/tags/$version" >/dev/null; then
            echo "$version already tagged."
            # Recovery path (PR #178 review): a tag whose release dispatch
            # failed — or predated release.yml — would otherwise be stranded.
            # Dispatch from main (which contains release.yml — a stranded tag
            # by definition does not; PR #181 review), tag passed as input.
            if ! gh release view "$version" >/dev/null 2>&1; then
              echo "$version has no release — dispatching."
              gh workflow run release.yml --ref main -f tag="$version" \
                || echo "::notice::release.yml not dispatchable — $version still has no release."
            fi
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git tag -a "$version" -m "Release $version"
          git push origin "$version"
          echo "Tagged $version."
          # Tag pushes from GITHUB_TOKEN fire no workflows — dispatch the
          # release directly, from main so the ref contains release.yml
          # (PR #181 review), with the tag as input pinning what gets built.
          gh workflow run release.yml --ref main -f tag="$version" \
            || echo "::notice::release.yml not dispatchable yet (#172) — tag $version created without a release run."
