# Packaging on demand (#53, #128). Deliberately NOT part of the PR
# gate — packaging is the slow lane; run it manually when packaging risk
# changes (Electron bumps, native modules, builder config). The Release
# workflow reuses this matrix via workflow_call so it lives in one place.
#
# Signing is env-gated (#128): when the CSC_LINK secret exists, the mac leg
# signs (Developer ID + hardened runtime) and notarizes (notarytool via the
# APPLE_API_* secrets). Without secrets the build is unsigned, as before.
# Windows signing waits on a certificate (#128).
name: Package

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      # Build a specific ref (the Release workflow pins builds to the tag even
      # when dispatched from main). Empty = the triggering ref, as before.
      ref:
        type: string
        required: false
        default: ''

permissions:
  contents: read

jobs:
  package:
    strategy:
      # The OS legs are independent — let one finish even if the other fails.
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Package
        shell: bash
        env:
          # Public installed-app OAuth identifier embedded at build time.
          OVERLOOK_GOOGLE_DRIVE_CLIENT_ID: ${{ secrets.GOOGLE_DRIVE_CLIENT_ID }}
          # Generated Desktop credential required by this issued client. Like
          # the client ID it is extractable installed-app metadata, but it is
          # kept out of source and injected only into the main-process bundle.
          OVERLOOK_GOOGLE_DRIVE_CLIENT_SECRET: ${{ secrets.GOOGLE_DRIVE_CLIENT_SECRET }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          MAC_PROVISIONING_PROFILE_B64: ${{ secrets.MAC_PROVISIONING_PROFILE }}
          APPLE_API_KEY_B64: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          if [ "$RUNNER_OS" = "macOS" ] && [ -n "$CSC_LINK" ]; then
            # electron-builder's notarytool integration wants APPLE_API_KEY as
            # a path to the .p8; the secret holds its base64-encoded contents.
            # Without the notarize secrets electron-builder signs but skips
            # notarization — the spctl gate below then fails the leg, so a
            # signed-but-unnotarized artifact can never ship.
            if [ -n "$APPLE_API_KEY_B64" ]; then
              export APPLE_API_KEY="$RUNNER_TEMP/asc-api-key.p8"
              printf '%s' "$APPLE_API_KEY_B64" | base64 -d > "$APPLE_API_KEY"
            fi
            if [ -n "$MAC_PROVISIONING_PROFILE_B64" ]; then
              export OVERLOOK_MAC_PROVISIONING_PROFILE="$RUNNER_TEMP/overlook.provisionprofile"
              printf '%s' "$MAC_PROVISIONING_PROFILE_B64" | base64 -d > "$OVERLOOK_MAC_PROVISIONING_PROFILE"
              npm run package:signed:provisioned
            else
              # A profile-free release remains launchable and signed, but its
              # Touch ID adapter fails closed to password/recovery fallback.
              npm run package:signed
            fi
            # electron-builder only *warns* when it can't find an identity, so
            # a broken cert would silently ship unsigned. Fail loudly instead:
            # a valid signature and a Gatekeeper pass (notarization is checked
            # online) are hard requirements of the signed path (#128).
            app=$(find release -maxdepth 2 -name '*.app' | head -1)
            if [ -n "$MAC_PROVISIONING_PROFILE_B64" ]; then
              node scripts/verify-macos-provisioned-app.mjs "$app"
            fi
            codesign --verify --deep --strict --verbose=2 "$app"
            spctl --assess --type execute --verbose=2 "$app"
            archive=$(find release -maxdepth 1 -name '*-mac.zip' | head -1)
            node scripts/verify-macos-app-launch.mjs "$archive"
          else
            # The mac cert must not leak into the unsigned path: with these
            # set, electron-builder would try to use CSC_LINK for Windows
            # signing too (and fail on a mac-only .p12).
            unset CSC_LINK CSC_KEY_PASSWORD
            npm run package
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: overlook-${{ matrix.os }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/sbom.cyclonedx.json
            THIRD-PARTY-NOTICES.md
          retention-days: 14
