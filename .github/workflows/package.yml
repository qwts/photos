# Packaging on demand (#53, #128). Deliberately NOT part of the PR
# gate — packaging is the slow lane; run it manually when packaging risk
# changes (Electron bumps, native modules, builder config). The Release
# workflow reuses this matrix via workflow_call so it lives in one place.
#
# Signing is env-gated (#128, #683): when the CSC_LINK secret exists, the mac leg
# signs (Developer ID + hardened runtime) and notarizes (notarytool via the
# APPLE_API_* secrets); when WIN_CSC_LINK exists, the Windows legs sign with
# Authenticode. Without secrets the builds are unsigned, as before.
#
# Windows ships two architectures (#683): the matrix runs the x64 and arm64
# legs on windows-latest (arm64 cross-compiled from the x64 runner), each
# producing an architecture-qualified NSIS installer whose payload architecture
# is verified post-build.
name: Package

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      # Build a specific ref (the Release workflow pins builds to the tag even
      # when dispatched from main). Empty = the triggering ref, as before.
      ref:
        type: string
        required: false
        default: ''

permissions:
  contents: read

jobs:
  package:
    strategy:
      # The legs are independent — let one finish even if another fails.
      fail-fast: false
      matrix:
        # One macOS leg plus one Windows leg per architecture (#683). arm64 is
        # cross-compiled on the x64 windows-latest runner; verify-windows-arch
        # proves the payloads are genuinely arm64.
        include:
          - os: macos-latest
          - os: windows-latest
            win-arch: x64
          - os: windows-latest
            win-arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Package
        shell: bash
        env:
          # Public installed-app OAuth identifier embedded at build time.
          OVERLOOK_GOOGLE_DRIVE_CLIENT_ID: ${{ secrets.GOOGLE_DRIVE_CLIENT_ID }}
          # Generated Desktop credential required by this issued client. Like
          # the client ID it is extractable installed-app metadata, but it is
          # kept out of source and injected only into the main-process bundle.
          OVERLOOK_GOOGLE_DRIVE_CLIENT_SECRET: ${{ secrets.GOOGLE_DRIVE_CLIENT_SECRET }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          MAC_PROVISIONING_PROFILE_B64: ${{ secrets.MAC_PROVISIONING_PROFILE }}
          APPLE_API_KEY_B64: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          # Windows Authenticode material (#683), kept separate from the mac
          # CSC_* secrets so a mac-only .p12 never reaches the Windows signer.
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          WIN_ARCH: ${{ matrix.win-arch }}
        run: |
          if [ "$RUNNER_OS" = "macOS" ] && [ -n "$CSC_LINK" ]; then
            # electron-builder's notarytool integration wants APPLE_API_KEY as
            # a path to the .p8; the secret holds its base64-encoded contents.
            # Without the notarize secrets electron-builder signs but skips
            # notarization — the spctl gate below then fails the leg, so a
            # signed-but-unnotarized artifact can never ship.
            if [ -n "$APPLE_API_KEY_B64" ]; then
              export APPLE_API_KEY="$RUNNER_TEMP/asc-api-key.p8"
              printf '%s' "$APPLE_API_KEY_B64" | base64 -d > "$APPLE_API_KEY"
            fi
            if [ -n "$MAC_PROVISIONING_PROFILE_B64" ]; then
              export OVERLOOK_MAC_PROVISIONING_PROFILE="$RUNNER_TEMP/overlook.provisionprofile"
              printf '%s' "$MAC_PROVISIONING_PROFILE_B64" | base64 -d > "$OVERLOOK_MAC_PROVISIONING_PROFILE"
              npm run package:signed:provisioned
            else
              # A profile-free release remains launchable and signed, but its
              # Touch ID adapter fails closed to password/recovery fallback.
              npm run package:signed
            fi
            # electron-builder only *warns* when it can't find an identity, so
            # a broken cert would silently ship unsigned. Fail loudly instead:
            # a valid signature and a Gatekeeper pass (notarization is checked
            # online) are hard requirements of the signed path (#128).
            app=$(find release -maxdepth 2 -name '*.app' | head -1)
            if [ -n "$MAC_PROVISIONING_PROFILE_B64" ]; then
              node scripts/verify-macos-provisioned-app.mjs "$app"
            fi
            codesign --verify --deep --strict --verbose=2 "$app"
            spctl --assess --type execute --verbose=2 "$app"
            archive=$(find release -maxdepth 1 -name '*-mac.zip' | head -1)
            node scripts/verify-macos-app-launch.mjs "$archive"
          elif [ "$RUNNER_OS" = "Windows" ]; then
            # The mac CSC_* secrets must never reach the Windows signer (a
            # mac-only .p12 would fail Authenticode). Windows signing draws from
            # its own WIN_CSC_* secrets, mapped onto the CSC_* names that
            # electron-builder reads. Absent WIN_CSC_LINK, the build is unsigned.
            unset CSC_LINK CSC_KEY_PASSWORD
            if [ -n "$WIN_CSC_LINK" ]; then
              export CSC_LINK="$WIN_CSC_LINK"
              export CSC_KEY_PASSWORD="$WIN_CSC_KEY_PASSWORD"
            fi
            # sharp ships its native binary as per-arch @img/sharp-win32-<arch>
            # optional deps; npm ci on the x64 runner installs only the host
            # (x64) one, so a cross-compiled arm64 build would bundle the x64
            # sharp binary (caught by verify-windows-arch). Fetch ONLY the
            # target-arch binary and swap it in: a plain `npm install --cpu/--os
            # sharp` re-resolves the whole tree's optional deps for the target
            # and prunes the x64 build toolchain (@rollup/rollup-win32-x64-msvc,
            # swc, …) that must run natively on this x64 runner. npm pack +
            # extract touches nothing else; better-sqlite3 is rebuilt for the
            # target arch by electron-builder's npmRebuild (#683).
            if [ "$WIN_ARCH" != "x64" ]; then
              sharp_ver=$(node -p "require('./node_modules/sharp/package.json').version")
              pkg="sharp-win32-$WIN_ARCH"
              npm pack "@img/$pkg@$sharp_ver" --pack-destination "$RUNNER_TEMP" >/dev/null
              dest="node_modules/@img/$pkg"
              rm -rf "$dest" && mkdir -p "$dest"
              tar -xzf "$RUNNER_TEMP/img-$pkg-$sharp_ver.tgz" -C "$dest" --strip-components=1
              # Drop the host-arch sharp binaries so only the target payload ships.
              find node_modules/@img -maxdepth 1 -type d -name 'sharp-win32-*' ! -name "$pkg" -exec rm -rf {} +
            fi
            npm run "package:win:$WIN_ARCH"
            # Prove the cross-compiled payloads are genuinely the target arch:
            # the installed executable and every native .node, not the i386 NSIS
            # stub. Auto-locates the arch's unpacked dir (win-unpacked for x64,
            # win-arm64-unpacked for arm64). Fails on any host-arch leak (#683).
            node scripts/verify-windows-arch.mjs "$WIN_ARCH"
            if [ -n "$WIN_CSC_LINK" ]; then
              # electron-builder only *warns* when signing is misconfigured, so
              # verify the Authenticode signature and timestamp explicitly — a
              # signed release must never ship unsigned installers (#683).
              for installer in release/Overlook-*-"$WIN_ARCH".exe; do
                signtool verify //pa //v "$installer"
              done
            fi
          else
            # Unsigned mac path. The mac cert must not leak into it: with these
            # set, electron-builder would try to use CSC_LINK for Windows
            # signing too (and fail on a mac-only .p12).
            unset CSC_LINK CSC_KEY_PASSWORD
            npm run package
          fi
          if [ "$RUNNER_OS" = "macOS" ]; then
            app=$(find release -maxdepth 2 -name '*.app' | head -1)
            node scripts/verify-macos-heic-preview.mjs "$app" tests/fixtures/heic/iphone-13-pro.heic
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          # Architecture-qualified name on Windows so the x64 and arm64 legs
          # upload to distinct artifacts (#683); macOS keeps its os-named one.
          name: overlook-${{ matrix.win-arch != '' && format('windows-{0}', matrix.win-arch) || matrix.os }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/sbom.cyclonedx.json
            THIRD-PARTY-NOTICES.md
          retention-days: 14
