# Unsigned dev packaging on demand (#53). Deliberately NOT part of the PR
# gate — packaging is the slow lane; run it manually when packaging risk
# changes (Electron bumps, native modules, builder config). The Release
# workflow reuses this matrix via workflow_call so it lives in one place.
name: Package

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  package:
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Package (unsigned)
        run: npm run package

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: overlook-${{ matrix.os }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
          retention-days: 14
