name: CI

on:
  pull_request:
    branches:
      - main
    # Default types plus ready_for_review: draft PRs skip the browser lanes (Storybook
    # interaction tests, Electron E2E) below, so the draft→ready flip must itself trigger
    # a run — that run supplies the full-suite verdict on the head SHA the ruleset checks.
    types: [opened, synchronize, reopened, ready_for_review]
  # Post-merge signal: merges may land via admin bypass, so run the same gates on main itself.
  push:
    branches:
      - main
  # The version-cut workflow dispatches CI onto its bot-maintained version branch:
  # GITHUB_TOKEN-created PRs get no pull_request runs, yet main requires the
  # "CI" and "E2E gate" checks (contexts match by name across event types).
  workflow_dispatch:
    inputs:
      e2e_workers:
        description: Electron E2E workers (capacity measurement; default 3)
        required: false
        type: choice
        options: ['1', '2', '3']
        default: '3'
      e2e_retries:
        description: Electron E2E retries (use 0 for capacity evidence)
        required: false
        type: choice
        options: ['0', '1', '2']
        default: '2'
      capacity_label:
        description: Label stored with runner-capacity evidence
        required: false
        type: string
        default: default
  # The merge queue (agents run `gh pr merge --auto` once a PR is ready) builds the
  # up-to-date merged state and requires the same "CI" and "E2E gate" contexts on it,
  # so this workflow must run on merge_group and report both. This is what lets a PR
  # merge without its branch ever being manually updated: staleness is validated on
  # the queue's merged state, not the PR head.
  merge_group:

# Cancel superseded PR runs — a stacked push otherwise burns a full run per commit. Main-push
# runs are keyed by SHA instead of ref: a shared ref group would let GitHub replace the single
# queued run when merges land back-to-back, silently dropping an intermediate commit's verdict.
# Per-SHA groups never collide, so every merge commit keeps its own post-merge run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.ref || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  pull-requests: read

jobs:
  # Path filter for the E2E job — the long pole. Skip it on PRs that cannot change app
  # behavior (docs-only, unit-test-only); re-run it whenever the app, the E2E harness,
  # build scripts, dependencies, the toolchain, or this workflow change. On push to main
  # E2E always runs (main must stay green regardless of the diff).
  #
  # tests/a11y/* is in the list because the violation budget (#398) decides whether the
  # a11y spec passes: tightening an entry without re-running E2E would leave the new
  # number unverified.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      # workflow_dispatch (the version branch) and merge_group (the queue's merged
      # state, about to become main) always run E2E: paths-filter has no base for
      # dispatch events, and a merge group gets main's own always-run rule — main
      # must stay green regardless of the diff.
      e2e: ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'merge_group') && 'true' || steps.filter.outputs.e2e }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Filter paths
        id: filter
        if: ${{ github.event_name != 'workflow_dispatch' && github.event_name != 'merge_group' }}
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
        run: |
          e2e=false
          if [[ "$BASE_SHA" =~ ^0+$ ]] || ! git cat-file -e "$BASE_SHA^{commit}"; then
            e2e=true
          else
            while IFS= read -r file; do
              case "$file" in
                src/*|tests/e2e/*|tests/a11y/*|scripts/*|playwright.config.ts|package.json|package-lock.json|tsconfig*.json|.nvmrc|.github/workflows/ci.yml)
                  e2e=true
                  break
                  ;;
              esac
            done < <(git diff --name-only "$BASE_SHA" "$GITHUB_SHA")
          fi
          echo "e2e=$e2e" >> "$GITHUB_OUTPUT"

  ci:
    name: CI
    runs-on: ubuntu-latest
    # This is a whole-job limit, not the sum of the guard's own budgets: the Test step
    # (test:cov, --timeout-s 900) and the Storybook step (test:stories:ci, --timeout-s 1800)
    # alone total 45 min of guard-permitted runtime, before counting checkout/npm ci/lint/
    # format/build/Playwright-install. Sized with headroom above that 45 min guard sum so
    # GitHub doesn't cancel the job outright before a guard step records .guard/last-run.json
    # (same reasoning as the E2E job's timeout-minutes below).
    timeout-minutes: 65
    env:
      INTEROP_IMAGE_TRAIL_ROOT: ${{ github.workspace }}/node_modules/.interop-image-trail

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Full history so lint:new-files can compute a merge-base with origin/main;
          # the default single-commit fetch made that gate silently skip in PR runs.
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          # Single source of truth: CI and local resolve Node from the same .nvmrc, so versions
          # never drift. `npm run ci` mirrors this job's gates (lint, format:check, test:cov,
          # build); bump .nvmrc to move local and CI together.
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Keep the companion checkout under the already-ignored dependency tree:
      # repo-wide Photos lint and package-pin scans must not treat Image Trail as
      # local source, while the acceptance gate still reads its pinned evidence.
      - name: Checkout pinned Image Trail acceptance evidence
        uses: actions/checkout@v7
        with:
          repository: qwts/image-trail
          ref: cf3fe884c7729db73cfe0ddb7c90be6c4d881c09
          path: node_modules/.interop-image-trail

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      # Acceptance-coverage gates (#82): the map validator (every spec mapped,
      # every path exists) + the diff gate (renderer changes must account for
      # their acceptance impact; PR body/labels are read live via gh when
      # available and fall back to the signed event snapshot during API outages).
      - name: Acceptance coverage
        env:
          GH_TOKEN: ${{ github.token }}
        run: npm run check:acceptance-coverage

      # The static half of the a11y gate (#398): shape, path existence, and owned debt.
      # The counts themselves are enforced at runtime by the Storybook and E2E axe lanes
      # below — those need a browser, this does not, so it fails fast and cheap.
      - name: A11y violation budget
        run: npm run check:a11y-budget

      # NODE_OPTIONS adds a second node:test reporter that turns failures into GitHub annotations
      # (file/line-anchored ::error in the run summary) — without it a red test step shows only a
      # blank "Error:" in the UI. CI-only by construction: the flags live here, not in package.json,
      # so local runs keep the plain spec output. Non-test node processes under the same step (tsc,
      # c8, npm itself) accept and ignore the flags.
      - name: Test
        env:
          NODE_OPTIONS: >-
            --test-reporter=spec --test-reporter-destination=stdout
            --test-reporter=node-test-github-reporter --test-reporter-destination=stdout
        run: npm run test:cov

      # Peak-RSS/duration record from the process-tree guard (scripts/run-guarded.mjs) for the
      # test:cov run above — the data source for ratcheting the guard ceilings. Runs even on
      # failure: an rss-limit/timeout kill is exactly when the record matters.
      - name: Guard diagnostics
        if: ${{ !cancelled() }}
        run: cat .guard/last-run.json || true

      # Render c8 totals vs. the floor into the run summary. Runs even when test:cov failed
      # (dropped below the floor) — that is when the numbers matter most.
      - name: Coverage summary
        if: ${{ !cancelled() }}
        run: npm run coverage:summary

      - name: Upload coverage
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/lcov.info

      - name: Build
        run: npm run build

      # Storybook interaction tests (#56): static build served over http,
      # test-runner drives it with Playwright chromium. Kept in this job (not
      # the Electron E2E job) — it needs a browser, not a display server.
      #
      # Draft PRs skip this lane (and E2E below): the working agreement has agents
      # pushing work-in-progress slices every few minutes, and burning a Storybook
      # build + Playwright run per slice buys a draft nothing. The deterministic
      # gates above still run on every push; the ready_for_review trigger guarantees
      # the full suite runs before the PR can merge. Non-PR events always run.
      - name: Install Playwright browsers (interaction tests)
        if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.draft }}
        run: npx playwright install --with-deps chromium

      - name: Storybook interaction tests
        if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.draft }}
        run: npm run test:stories:ci

      # See the guard diagnostics note on the Test step above — same record, for the
      # Storybook lane's guard.
      - name: Guard diagnostics (Storybook)
        if: ${{ !cancelled() && (github.event_name != 'pull_request' || !github.event.pull_request.draft) }}
        run: cat .guard/last-run.json || true

  # E2E is its own job so it runs in parallel with the lint/unit/build gates above, and so
  # the change filter can skip it wholesale on PRs that cannot affect it. test:e2e builds
  # the app once via the Playwright global-setup, then runs the specs across workers
  # (see playwright.config.ts).
  e2e:
    name: E2E
    needs: changes
    # Drafts skip E2E even when the path filter matches: work-in-progress pushes land
    # every few minutes and the Electron lane is the long pole. The ready_for_review
    # trigger re-runs the whole workflow on the head SHA when the PR leaves draft, so
    # nothing merges on a draft skip. Non-PR events (push, dispatch) are unaffected.
    if: ${{ (github.event_name == 'push' || needs.changes.outputs.e2e == 'true') && (github.event_name != 'pull_request' || !github.event.pull_request.draft) }}
    runs-on: ubuntu-latest
    # This is a whole-job limit, not the guard's own budget: npm run test:e2e runs under
    # scripts/run-guarded.mjs with --timeout-s 1800 (30 min). Checkout/npm ci/Electron system
    # deps run before that step and the report upload runs after it, so the job timeout must
    # exceed the guard timeout with headroom — otherwise GitHub can cancel the job outright
    # before the guard records .guard/last-run.json or the report uploads (as perf.yml already
    # does for its own guarded step).
    timeout-minutes: 45
    env:
      OVERLOOK_E2E_WORKERS: ${{ github.event_name == 'workflow_dispatch' && inputs.e2e_workers || '3' }}
      OVERLOOK_E2E_RETRIES: ${{ github.event_name == 'workflow_dispatch' && inputs.e2e_retries || '2' }}
      OVERLOOK_CAPACITY_LABEL: ${{ github.event_name == 'workflow_dispatch' && inputs.capacity_label || 'default' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      # The lane drives the real Electron app (no downloaded browser): Electron
      # brings its own Chromium but needs the OS libraries and a display server.
      # install-deps covers the shared libraries; xvfb provides the display.
      - name: Install Electron system dependencies
        run: |
          npx playwright install-deps chromium
          sudo apt-get install --yes xvfb

      # Materialize the Electron binary BEFORE tests: parallel workers racing
      # the lazy first-run download exec a half-written binary (ETXTBSY).
      # Idempotent when the postinstall already fetched it.
      - name: Ensure Electron binary
        run: node node_modules/electron/install.js

      - name: Playwright E2E tests (Electron under Xvfb)
        run: xvfb-run --auto-servernum -- node scripts/measure-runner-capacity.mjs -- npm run test:e2e

      # See the CI job's "Guard diagnostics" step — same record, for the e2e ceiling.
      - name: Guard diagnostics
        if: ${{ !cancelled() }}
        run: cat .guard/last-run.json || true

      - name: Runner capacity summary
        if: ${{ !cancelled() }}
        run: cat test-results/runner-capacity.json || true

      - name: Upload runner capacity evidence
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: runner-capacity-${{ github.run_attempt }}-${{ env.OVERLOOK_E2E_WORKERS }}w
          path: test-results/runner-capacity.json
          retention-days: 30

      # The HTML report is a self-contained clickable app (per-test steps, and screenshots /
      # videos / time-travel traces on failure). Upload it even when the E2E step fails —
      # that is exactly when it matters. View: download, unzip, `npx playwright show-report <dir>`.
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  # Stable required check for the E2E path. It always runs and reports a definitive verdict, so a
  # path-filtered skip never leaves a required check stuck "Expected". Require THIS job ("E2E gate")
  # in the branch ruleset — not "E2E", which is legitimately skipped on non-E2E PRs.
  e2e-gate:
    name: E2E gate
    needs: [changes, e2e]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify E2E result
        run: |
          changes='${{ needs.changes.result }}'
          e2e='${{ needs.e2e.result }}'
          echo "Detect changes: $changes | E2E job: $e2e"
          # A skip is only trustworthy when change detection itself succeeded and either the
          # filter decided E2E wasn't needed or the PR is a draft (drafts cannot merge, and the
          # ready_for_review trigger re-runs the suite on the head SHA before merge is possible).
          # If the changes job failed or was cancelled, the E2E skip is an artifact of that
          # failure, not an intentional opt-out — fail so it can't slip through.
          if [ "$changes" != 'success' ]; then
            echo "Change detection did not succeed ($changes); refusing to accept an E2E skip." >&2
            exit 1
          fi
          # With change detection healthy: a skipped E2E job (filter opted out) is a pass, as is
          # success; anything else (failure, cancelled) fails the gate.
          if [ "$e2e" = 'success' ] || [ "$e2e" = 'skipped' ]; then
            exit 0
          fi
          exit 1

  # Publishes the Playwright HTML report to GitHub Pages at a stable per-PR URL:
  #   https://qwts.github.io/photos/reports/pr-<number>/
  # Each run replaces that PR's report (bounded growth); the artifact above keeps 14 days of
  # history. Publishes on every run where E2E actually executed — green or red. The deploy
  # races that once made green publishing noisy are contained by the freshness check below
  # plus the gh-pages concurrency group; red runs still carry traces/screenshots/videos.
  e2e-report:
    name: Publish E2E report
    needs: e2e
    # PR-only (the stable URL is per-PR). Skipped E2E (non-E2E PRs) has no report to publish.
    if: ${{ !cancelled() && needs.e2e.result != 'skipped' && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      # actions: write lets the verify step rerun GitHub's managed "pages build and deployment"
      # workflow when it flakes ("Deployment failed, try again later"), instead of leaving a red
      # run for a human to retry.
      actions: write
    # All e2e-report runs push to the same gh-pages branch, so serialize them across the whole
    # workflow (not per PR) to avoid non-fast-forward push races between concurrent PRs.
    concurrency:
      group: e2e-report-gh-pages
      cancel-in-progress: false
    steps:
      - name: Download Playwright report
        id: download
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: playwright-report
          path: playwright-report

      # Concurrency ordering within a group is not guaranteed, so an older run finishing late
      # could overwrite the stable per-PR URL with stale results. Only deploy when this run's
      # commit is still the PR's current head.
      - name: Check this run is for the PR's current head
        id: freshness
        if: ${{ steps.download.outcome == 'success' }}
        run: |
          current=$(git ls-remote "https://github.com/${{ github.repository }}.git" "refs/heads/${{ github.head_ref }}" | cut -f1)
          if [ "$current" = "${{ github.event.pull_request.head.sha }}" ]; then
            echo "fresh=true" >> "$GITHUB_OUTPUT"
          else
            echo "fresh=false" >> "$GITHUB_OUTPUT"
            echo "Skipping deploy: this run is for ${{ github.event.pull_request.head.sha }} but the branch head is ${current:-unavailable}."
          fi

      - name: Deploy report to GitHub Pages
        if: ${{ steps.download.outcome == 'success' && steps.freshness.outputs.fresh == 'true' }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: playwright-report
          destination_dir: reports/pr-${{ github.event.pull_request.number }}
          commit_message: 'E2E report for PR #${{ github.event.pull_request.number }} (run ${{ github.run_id }})'

      # The peaceiris step only pushes to gh-pages; GitHub's managed "pages build and deployment"
      # workflow then publishes the branch, and it occasionally flakes server-side ("Deployment
      # failed, try again later"). Verify the latest Pages build is `built` and includes the
      # commit we just pushed; on a failed managed run, rerun it once (which also turns that red
      # run green) and keep polling. Exhausting the poll emits a WARNING, not a failure — the
      # report commit is already on gh-pages and a lagging Pages publish is GitHub's infra, not
      # this PR's code; a red X here just trains people to ignore the job.
      - name: Verify Pages picked up the deploy (self-heal once)
        id: verify
        if: ${{ steps.download.outcome == 'success' && steps.freshness.outputs.fresh == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          ours=$(gh api "repos/$REPO/branches/gh-pages" --jq .commit.sha)
          echo "Pushed gh-pages commit: $ours"
          healed=false
          for i in $(seq 1 30); do
            status=$(gh api "repos/$REPO/pages/builds/latest" --jq .status || echo unknown)
            built=$(gh api "repos/$REPO/pages/builds/latest" --jq .commit || echo "")
            if [ "$status" = "built" ] && [ -n "$built" ]; then
              # Success if the built commit is ours or a descendant of ours (another PR may have
              # deployed after us; the branch history still contains our report directory).
              relation=$(gh api "repos/$REPO/compare/$ours...$built" --jq .status 2>/dev/null || echo unrelated)
              if [ "$built" = "$ours" ] || [ "$relation" = "ahead" ] || [ "$relation" = "identical" ]; then
                echo "Pages build $built is live and includes our deploy."
                exit 0
              fi
            fi
            if [ "$healed" = "false" ]; then
              failed_run=$(gh api "repos/$REPO/actions/runs?per_page=10" \
                --jq "[.workflow_runs[] | select(.name == \"pages build and deployment\" and .conclusion == \"failure\" and .head_sha == \"$ours\")][0].id // empty")
              if [ -n "$failed_run" ]; then
                echo "Managed Pages deployment $failed_run failed; rerunning it once."
                gh run rerun "$failed_run" --failed --repo "$REPO" && healed=true
              fi
            fi
            sleep 10
          done
          echo "::warning title=Pages deploy unconfirmed::gh-pages has the report commit but the managed Pages build never confirmed within 5m (last status: $status). The report URL may lag; no action needed on this PR."
          exit 0

      - name: Link report in run summary
        if: ${{ steps.verify.outcome == 'success' }}
        run: |
          {
            echo "### Playwright E2E report"
            echo ""
            echo "https://qwts.github.io/photos/reports/pr-${{ github.event.pull_request.number }}/"
            echo ""
            echo "_Traces, screenshots, and videos are attached to failed tests._"
          } >> "$GITHUB_STEP_SUMMARY"
