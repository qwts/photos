# The hand-rolled merge queue (user-owned repos get no real one — GitHub's merge
# queue is organizations-only). Three pieces compose into serialized, always-tested-
# on-tip merges:
#
#   1. This workflow: every push to main updates each open, non-draft, non-bot PR
#      branch by MERGING main into it (GitHub's update-branch API) — no rebase, no
#      force-push, no history rewrite.
#   2. The ruleset's strict up-to-date requirement: a PR whose branch is behind main
#      cannot merge, so auto-merge can never land a stale-green combination.
#   3. Auto-merge (agents run `gh pr merge --auto --merge` once ready): lands the PR
#      as a merge commit the moment its updated head goes green and threads resolve.
#
# The cascade after each merge — update next PR → CI on the true merged state →
# auto-merge — is exactly what a merge queue does, minus the queue UI. Nobody
# clicks "update branch" by hand.
#
# Why RELEASE_TOKEN instead of GITHUB_TOKEN: pushes made with GITHUB_TOKEN do not
# trigger downstream workflows, so the old version had to re-dispatch CI by hand
# (and that manual lane needed workflow-run approval). Updating the branch under a
# real PAT fires the PR's `synchronize` event normally, so CI runs on its own —
# no re-dispatch step, no `actions: write`, no "allow workflow" click. The
# update-branch API produces GitHub-signed merge commits, so `required_signatures`
# on main is satisfied without any local signing.
#
# Excluded branches: dependabot/* (a foreign update makes Dependabot stop
# maintaining its PR — comment `@dependabot rebase` instead) and changeset-release/*
# (the version-cut workflow force-pushes it already).
name: Auto-update PR branches

on:
  push:
    branches:
      - main
  # A draft skipped during a main merge would otherwise sit stuck once marked
  # ready: strict up-to-date blocks its auto-merge, and nothing re-runs this
  # updater until the next unrelated merge (PR #541 review). The ready flip —
  # and a PR opened or reopened on an already-stale base — gets an update pass
  # of its own. Draft-opened PRs no-op in the job's non-draft filter.
  #
  # pull_request_target, NOT pull_request: this job injects the RELEASE_TOKEN
  # PAT, and a PR that edits this file must not be able to run its modified YAML
  # with that secret. pull_request_target always runs the workflow definition
  # from the base ref (main, i.e. already-reviewed), and this job never checks
  # out or executes PR head code — it only makes API calls — so the usual
  # pull_request_target code-injection risk does not apply.
  pull_request_target:
    types: [opened, reopened, ready_for_review]
  # Manual lever for recovery (e.g. after a conflict was resolved elsewhere).
  workflow_dispatch:

# Normal runs authenticate with RELEASE_TOKEN (a PAT). These scopes exist only
# for the `|| github.token` fallback below (when the secret is absent): listing
# PRs needs pull-requests read, and update-branch needs contents write.
permissions:
  contents: write
  pull-requests: read

# One updater at a time, and GitHub keeps at most one queued run per group — a burst
# of merges coalesces into the run that sees the final main tip.
concurrency:
  group: auto-update-prs
  cancel-in-progress: false

jobs:
  update:
    name: Merge main into open PRs
    runs-on: ubuntu-latest
    # Dependabot-triggered runs are not given regular Actions secrets, so
    # RELEASE_TOKEN would be empty; skip them (their PRs are excluded from the
    # updater anyway — `@dependabot rebase` maintains those).
    if: github.actor != 'dependabot[bot]'
    steps:
      - name: Update each behind branch by merging main into it
        env:
          # RELEASE_TOKEN so the resulting push fires each PR's CI automatically;
          # fall back to the default token so the job never runs with an empty
          # GH_TOKEN if the secret is ever missing (that path can update branches
          # but won't auto-trigger CI — a GITHUB_TOKEN limitation, not a bug).
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
          REPO: ${{ github.repository }}
        run: |
          gh pr list --repo "$REPO" --state open \
            --json number,isDraft,headRefName,headRefOid,headRepositoryOwner \
            --jq '.[] | select(.isDraft | not)
                      | select(.headRepositoryOwner.login == "'"${REPO%%/*}"'")
                      | select((.headRefName | startswith("dependabot/")) or (.headRefName | startswith("changeset-release/")) | not)
                      | "\(.number)\t\(.headRefName)\t\(.headRefOid)"' |
          while IFS=$'\t' read -r number branch sha; do
            behind=$(gh api "repos/$REPO/compare/main...$branch" --jq .behind_by 2>/dev/null || echo unknown)
            if [ "$behind" = "unknown" ]; then
              echo "::warning title=PR #$number::could not compare $branch to main; skipping."
              continue
            fi
            if [ "$behind" -eq 0 ]; then
              echo "PR #$number ($branch) is current; nothing to do."
              continue
            fi
            # expected_head_sha is update-branch's optimistic lock: if the owning
            # agent pushed between our list and now, GitHub 422s and the next main
            # merge retries us — the same guarantee the old --force-with-lease gave.
            if gh api -X PUT "repos/$REPO/pulls/$number/update-branch" \
                 -f expected_head_sha="$sha" >/dev/null 2>&1; then
              echo "PR #$number ($branch): merged main in ($behind behind); CI will run on the new head."
            else
              # Either a real merge conflict (the PR now shows CONFLICTING and
              # AGENTS.md points the owner there) or a lost race on expected_head_sha
              # (retried on the next merge). Non-fatal for the rest of the queue.
              echo "::warning title=PR #$number needs attention::update-branch failed for $branch (conflict or raced push); skipped."
            fi
          done
