name: Close linked issues

# pull_request_target, not pull_request: fork-PR pull_request runs get a read-only
# GITHUB_TOKEN regardless of the permissions block, so gh issue close would fail.
# Safe here: the default checkout is the trusted BASE ref (main), so the script that
# runs is main's copy — PR head code is never executed; the PR body is only parsed.
on:
  pull_request_target:
    types:
      - closed
    branches:
      - main

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  close-linked-issues:
    name: Close linked issues
    # Keep in sync with TARGET_BASE_REFS in scripts/close-linked-issues.mjs.
    if: |
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Close issues referenced by merged PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/close-linked-issues.mjs
