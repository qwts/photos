<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- connect-src ws: keeps electron-vite's HMR websocket working in dev;
         everything else is same-origin only. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' ws:"
    />
    <title>Overlook</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
