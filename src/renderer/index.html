<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Production CSP. Dev tooling needs allowances production must not have
         (inline Fast Refresh preamble, blob: worker, HMR websocket);
         electron.vite.config.ts swaps this tag's content while serving. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'"
    />
    <title>Overlook</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
