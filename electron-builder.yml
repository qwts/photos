# Packaging config (#53, #128). Signed-capable but env-gated: `npm run
# package` forces unsigned builds via the `-c.mac.identity=null` CLI override
# (electron-builder coerces the string to null and skips signing);
# `npm run package:signed` uses the profile-free entitlement baseline, signing with
# CSC_LINK/CSC_KEY_PASSWORD and notarizing via notarytool with
# APPLE_API_KEY (path to .p8) / APPLE_API_KEY_ID / APPLE_API_ISSUER.
# `npm run package:signed:provisioned` validates and embeds a Developer ID
# profile before enabling the restricted Touch ID identity entitlements.
# Windows signing stays out until a cert exists (#128).
appId: com.qwts.overlook
productName: Overlook
directories:
  output: release
files:
  - out/**
  # The workspace is linked during packaging, so electron-builder otherwise
  # copies native build inputs and a duplicate node-gyp output. Runtime needs
  # only index.cjs, package metadata, and the N-API prebuild.
  - '!node_modules/@overlook/touch-id/build/**'
  - '!node_modules/@overlook/touch-id/install.cjs'
  - '!node_modules/@overlook/touch-id/prepare-prebuild.cjs'
  - '!node_modules/@overlook/touch-id/touch_id.mm'
# Everything ships bundled by electron-vite (no runtime node_modules yet);
# native modules must land in "dependencies" so npmRebuild picks them up
# (ADR-0006's prebuilt-only policy — better-sqlite3/sharp arrive with M03).
npmRebuild: true
# Native Node-API binaries cannot execute from inside app.asar. Keep the
# signed Touch ID bridge beside the archive where Electron can dlopen it.
asarUnpack:
  - '**/*.node'
# App icons live in build/ (electron-builder's default buildResources dir),
# regenerated from the design handoff via scripts/generate-app-icons.sh
# (#236). Committed so CI needs no icon tooling.
mac:
  icon: build/icon.icns
  target:
    - dmg
    - zip
  # Notarization requires the hardened runtime; entitlements come from
  # our pinned profile-free copy of electron-builder's Electron template.
  # Restricted identity entitlements are enabled only by the explicit
  # provisioned packaging path; signing them without a profile prevents launch.
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  # Helpers/native children get only Electron's runtime allowances; Keychain
  # custody stays on the main executable's signing identity.
  entitlementsInherit: build/entitlements.mac.inherit.plist
  # Runs only after a successful signing pass, and skips with a warning when
  # the APPLE_API_* env vars are absent — so unsigned builds are unaffected.
  notarize: true
win:
  icon: build/icon.ico
  target:
    - nsis
